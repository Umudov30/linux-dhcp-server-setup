# DHCP Server Configuration File
# See /usr/share/doc/dhcp-server/dhcpd.conf.example for a full example
# See dhcpd.conf(5) man page for details

# -------------------------------------------------------
# Global Settings
# -------------------------------------------------------

# Default lease time (in seconds) — 10 minutes
default-lease-time 600;

# Maximum lease time (in seconds) — 2 hours
max-lease-time 7200;

# -------------------------------------------------------
# Subnet Declaration
# -------------------------------------------------------

subnet 10.1.1.0 netmask 255.255.255.0 {

    # IP address range to assign to clients
    range 10.1.1.100 10.1.1.150;

    # DNS server
    option domain-name-servers 10.1.1.2;

    # Default gateway (router)
    option routers 10.1.1.2;
}

# -------------------------------------------------------
# Static IP Assignment (Optional)
# -------------------------------------------------------
# Uncomment and edit below to assign a fixed IP to a specific MAC address

# host specific-client {
#     hardware ethernet 00:0C:29:2B:2C:21;
#     fixed-address 10.1.1.200;
# }
